<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Heiwa | 3D Design</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background-color: #f4f4f4; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        model-viewer { width: 90%; height: 70vh; background-color: #ffffff; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .info { text-align: center; margin-top: 20px; }
        h1 { font-weight: 300; letter-spacing: 2px; text-transform: uppercase; font-size: 1.2rem; }
        p { color: #666; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="info">
        <h1>3D Landscape Design</h1>
        <p>Optimized Low-Poly Environment by Studio Heiwa</p>
    </div>

    <model-viewer src="3d landscape_env.glb" 
                  ar ar-modes="webxr scene-viewer quick-look" 
                  camera-controls 
                  auto-rotate 
                  shadow-intensity="1">
    </model-viewer>

    <div class="info">
        <p>IT Finalist | Digital Architect | Remote 🌍</p>
    </div>

</body>
</html>
